name: CI POST SERVICE

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci-post-service.yaml"
      - "services/post-service/**"

  pull_request:
    branches: [main]
    paths:
      - ".githuh/workflows/ci-post-service.yaml"
      - "services/post-service/**"
  workflow_dispatch:

jobs:
  lint-and-test:
    name: lint-and-test-python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/post-service/requirements.txt

      - name: Install Dependencies
        run: |
          cd services/post-service/
          pip install --upgrade pip
          pip install flake8 black
          pip install -r requirements.txt

      - name: Check Formatting (Black)
        run: |
          cd services/post-service/
          black --check app

      - name: Lint with Flake8
        run: |
          cd services/post-service/
          # stop the build if there are Python syntax errors or undefined names
          flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  build-and-scan:
    name: Build-&-scan-container
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image Locally
        uses: docker/build-push-action@v3
        with:
          context: ./services/post-service
          file: ./services/post-service/Dockerfile
          load: true
          tags: |
            ghcr.io/${{ github.repository }}/post-service:latest
            ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}

      - name: Git leaks
        uses: zricethezav/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ghcr.io/${{ github.repository }}/post-service:latest"
          format: table
          exit-code: 1
          ignore-unfixed: true
          vlun-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Push to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ghcr.io/${{ github.repository }}/post-service:latest
          docker push ghcr.io/${{ github.repository }}/post-service:${{ github.sha }}
