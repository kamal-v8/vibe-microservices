name: CI NOTIFICATION SERVICE

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci-notification.yaml"
      - "services/notification-service/**"

  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci-notification.yaml"
      - "services/notification-service/**"
  workflow_dispatch:

jobs:
  lint-and-test:
    name: lint-&-test-nodejs
    runs-on: ubuntu-latest
    steps:
      - name: Code-Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/notification-service/package-lock.json

      - name: Install-Dependencies
        run: |
          cd ./services/notification-service/
          npm ci

      - name: Syntax-Check
        run: |
          cd ./services/notification-service/
          node --check src/index.js
          node --check src/config.js
          node --check src/logger.js
          node --check src/subscriber.js

  build-and-scan:
    name: build-&-scan-container
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout-Code
        uses: actions/checkout@v4

      - name: Setup-QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build-docker-image-locally
        uses: docker/build-push-action@v3
        with:
          context: ./services/notification-service
          file: ./services/notification-service/Dockerfile
          load: true
          tags: |
            ghcr.io/${{ github.repository }}/notification-service:latest
            ghcr.io/${{ github.repository }}/notification-servie:${{ github.sha }}

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy scan Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/{{ github.repositroy }}/notification-service:latest
          format: "table"
          exit-code: 1
          vuln_type: "os,library"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"

      - name: Push Docker Image to GHCR
        if: github.event_name == 'push && github.ref' == 'refs/heads/main'
        run: |
          docker push ghcr.io/${{ github.repositroy }}/notification-service:latest
          docker push ghcr.io/${{ github.repositroy }}/notification-service:${{ github.sha }}
