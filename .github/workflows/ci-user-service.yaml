name: CI-USER-SERVICE

on:
  push:
    branches: [main]
    paths:
      - "services/user-service/**"
      - ".github/workflows/ci-user-service.yaml"
  pull_request:
    branches: [main]
    paths:
      - "services/user-service/**"
      - ".github/workflows/ci-user-service.yaml"
  workflow_dispatch:

jobs:
  lint-and-test:
    name: lint-&-test-go
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: SetupGO
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: services/user-service/go.sum

      - name: Verfiy Formatting
        run: |
          cd services/user-service
          if [ -n "$(go fmt ./...)" ]; then
            echo "Go code is not formatted. Run 'go fmt ./...'."
            exit 1
          fi

      - name: Go Vet
        run: |
          cd services/user-service
          go vet ./...

      - name: Go test
        run: |
          cd services/user-service/
          go test -v ./...

  build-and-scan:
    name: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image Locallly
        uses: docker/build-push-action@v3
        with:
          context: ./services/user-service
          file: ./services/user-service/Dockerfile
          load: true
          tags: |
            ghcr.io/${{ github.repository }}/user-service:latest
            ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}

      - name: Git Leaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/user-service:latest
          format: "table"
          exit-code: 1
          ignore-unfixed: true
          vlun-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Push Docker Image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ghcr.io/${{ github.repository }}/user-service:latest
          docker push ghcr.io/${{ github.repository }}/user-service:${{ github.sha }}
