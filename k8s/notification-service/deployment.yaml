apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  labels:
    name: notification-service

spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service-pod
          image: kamalv007/social-notification-service:v1
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8083
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "8083"
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: pulse-shared-config
                  key: REDIS_URL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: pulse-shared-config
                  key: LOG_LEVEL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          ports:
            - containerPort: 8083
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 5
