apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  labels:
    name: notification-service

spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service-pod
          image: kamalv007/social-notification-service:v1
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "8083"
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: pulse-shared-config
                  key: REDIS_URL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: pulse-shared-config
                  key: LOG_LEVEL
          ports:
            - containerPort: 8083
